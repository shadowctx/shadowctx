<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowCTX</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>ShadowCTX</h1>
    </header>

    <div id="page-info">
      <div class="url-display" id="url-display" title=""></div>
      <div class="title-display" id="title-display"></div>
    </div>

    <div class="field">
      <label for="note">Note</label>
      <textarea id="note" placeholder="Optional note..." rows="2"></textarea>
    </div>

    <div class="field">
      <label for="tags">Tags</label>
      <input id="tags" type="text" placeholder="comma separated, e.g. ai, research" />
    </div>

    <button id="save-btn" class="btn-primary">Save Page</button>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
